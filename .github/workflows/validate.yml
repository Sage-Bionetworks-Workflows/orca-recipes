
name: Validate

on: # Run on new commits and PR openings
  push:
    branches:
      - '**' 
  pull_request:
    types: [opened, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          
      - name: Install airflow deps
        run: |
          pip install -r requirements-airflow.txt
          
      - name: Run tests
        run: |
          PYTHONPATH=src python -m pytest tests/ -v --tb=short
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install "ruff>=0.15.17"

      - name: Lint changed DAGs for Airflow 3 deprecations
        continue-on-error: true
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          if [ -z "$BASE_BRANCH" ]; then
            BASE_BRANCH="main"
          fi

          git fetch origin "$BASE_BRANCH"

          files=$(git diff --name-only "origin/$BASE_BRANCH"...HEAD -- 'dags/**/*.py' 'dags/*.py')

          if [ -n "$files" ]; then
            ruff check $files --select AIR3 --output-format=github
          else
            echo "No changed DAG files to lint."
          fi