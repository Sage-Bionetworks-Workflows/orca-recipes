
name: Validate

on: # Run on new commits and PR openings
  push:
    branches:
      - '**' 
  pull_request:
    types: [opened, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          
      - name: Install airflow deps
        run: |
          pip install -r requirements-airflow.txt
          
      - name: Run tests
        run: |
          PYTHONPATH=src python -m pytest tests/ -v --tb=short
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ruff
        run: pip install "ruff>=0.15.17"

      # AIR3 = Ruff's Airflow 3.x deprecation/removal rules (e.g. schedule_interval,
      # execution_date). Catches DAG code that will break on the Airflow 3 upgrade
      # only with changed files
      - name: Lint DAGs for Airflow 3 deprecations
        continue-on-error: true
        run: |
          files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'dags/**/*.py' 'dags/*.py')
          if [ -n "$files" ]; then
            ruff check $files --select AIR3 --output-format=github
          fi